name: Cleanup PR Deployment

on:
  pull_request:
    types: [closed]

jobs:
  detect:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      projects: ${{ steps.detect.outputs.projects }}
    steps:
    - name: Detect changed projects
      id: detect
      uses: actions/github-script@v7
      with:
        script: |
          const files = await github.paginate(
            github.rest.pulls.listFiles,
            {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            }
          );
          const projectDirs = new Set();
          for (const file of files) {
            const parts = file.filename.split('/');
            if (parts.length > 1) {
              projectDirs.add(parts[0]);
            }
          }
          const projects = Array.from(projectDirs).join(' ');
          core.setOutput('projects', projects);
          console.log('Detected projects:', projects);

  cleanup:
    needs: detect
    runs-on: ubuntu-latest
    if: needs.detect.outputs.projects != ''
    permissions:
      contents: read
      pull-requests: write

    steps:
    - name: Setup SSH key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

    - name: Remove WIP deployments
      run: |
        for PROJECT in ${{ needs.detect.outputs.projects }}; do
          DEPLOY_DIR="${{ secrets.DEPLOY_BASE_PATH }}/$PROJECT-wip"
          echo "Removing $DEPLOY_DIR..."
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SERVER_HOST }} "rm -rf $DEPLOY_DIR"
        done

    - name: Comment on PR
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `🧹 **PR deployment cleaned up**\n\nThe WIP deployment(s) for this PR have been removed.`
          });
